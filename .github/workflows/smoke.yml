name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run engine smoke tests
        run: npm test
